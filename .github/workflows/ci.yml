name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: url_shortener
      DB_SYNCHRONIZE: 'true'
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1d
      BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      # Use the MySQL already installed on the runner (no Docker image pull).
      - name: Start MySQL
        run: |
          sudo systemctl start mysql.service
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS url_shortener;"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm run test:e2e
